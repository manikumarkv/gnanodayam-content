name: Compile paths index
# Regenerates paths/index.json from the paths/*.json source files on every push, so authors only
# add/edit/remove a per-path file and the served index keeps itself in sync (ADR 0006). Validates
# codes/parents and cascade-excludes draft subtrees so drafts never reach the CDN.
on:
  push:
    branches: [main]
    paths: ['paths/**', '!paths/index.json'] # the bot's own index commit doesn't re-trigger
permissions:
  contents: write
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate paths/index.json from the source files
        run: node scripts/compile-paths.mjs
      - name: Commit if changed
        run: |
          if ! git diff --quiet paths/index.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add paths/index.json
            git commit -m "chore: regenerate paths index [skip ci]"
            git push
          fi
